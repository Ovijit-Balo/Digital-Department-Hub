version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: ddh-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ddh-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    container_name: ddh-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/digital_department_hub
      JWT_SECRET: replace-with-strong-secret
      JWT_EXPIRES_IN: 1d
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:8080
      LOG_LEVEL: info
      RUN_WORKER_WITH_API: 'false'
    ports:
      - '5000:5000'

  worker:
    build:
      context: ./backend
    container_name: ddh-worker
    restart: unless-stopped
    command: npm run worker
    depends_on:
      - backend
      - redis
      - mongo
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/digital_department_hub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: replace-with-strong-secret
      JWT_EXPIRES_IN: 1d
      LOG_LEVEL: info

  frontend:
    build:
      context: ./frontend
    container_name: ddh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  mongo_data:
