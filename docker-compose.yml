version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: ddh-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ddh-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    container_name: ddh-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file:
      - ./backend/.env
    ports:
      - '5000:5000'

  worker:
    build:
      context: ./backend
    container_name: ddh-worker
    restart: unless-stopped
    command: npm run worker
    depends_on:
      - backend
      - redis
      - mongo
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: ddh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  mongo_data:
